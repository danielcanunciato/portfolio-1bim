<!DOCTYPE html>

    <head>

        <title>Checagem de Idade</title>
        <link rel="stylesheet" href="styles.css">

    </head>

    <body>

        <h2>Checagem de Idade</h2>

        <form id="main-form">

            <div class="form-control">
                <label><b>Coloque seu nome:</b></label>
                <input type="text" name="nome" placeholder="Cleyton da Silva">
            </div>

            <div class="form-control">
                <label><b>Coloque sua idade:</b></label>
                <input type="number" name="idade" placeholder="24">
            </div>

            <button id="submit">ENVIAR</button>

        </form>

        <h1 id="output"></h1>

    </body>

    <script src="script.js"></script>

</html>
